<!--
========================================
CORES UTILIZADAS NO PROJETO
========================================

PRETO:
black

BRANCO:
white

PRATA DA BORDA:
silver

========================================
ONDE TROCAR AS CORES
========================================

FUNDO DA PÁGINA:
background: black;

BORDA DO CANVAS:
border: 2px solid silver;

FUNDO DO JOGO:
draw_fill_rect(... "black")

JOGADORES:
"white"

LINHA CENTRAL:
"white"

PLACAR:
"white"

BOLA:
"white"

========================================
TROCA DE PÁGINA
========================================

O jogo agora:
- funciona normalmente
- possui IA
- possui som
- após alguns segundos
troca automaticamente de página

Página:
game-character.html

Tempo:
15000 = 15 segundos

Para mudar:
setTimeout(...)

========================================
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Pong Game</title>

    <style>

        /* FUNDO DA PÁGINA */
        html, body {

            margin: 0;
            padding: 0;

            background: black;
        }

        /* CENTRALIZA O JOGO */
        .container {

            display: flex;
            justify-content: center;
            align-items: center;

            width: 100vw;
            height: 100vh;
        }

        /* CANVAS */
        #canva {

            width: 800px;
            height: 600px;

            border: 2px solid silver;

            background: black;
        }

    </style>

</head>

<body>

    <div class="container">

        <canvas id="canva"
        width="800"
        height="600">

            O navegador não suporta canvas.

        </canvas>

    </div>

<script>

    // =========================
    // CANVAS
    // =========================

    var canva =
    document.getElementById("canva")

    var ctx =
    canva.getContext("2d")

    var time_temp = 0

    // =========================
    // SOM DA BOLA
    // =========================

    var hit_sound = new Audio(
    "https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"
    )

    // =========================
    // PLAYER 1
    // =========================

    var player_1 = {

        x: 3,

        y:
        (canva.height / 2) - 50,

        w: 30,
        h: 100,

        move: 0
    }

    // =========================
    // PLAYER 2 (IA)
    // =========================

    var player_2 = {

        x:
        canva.width - 35,

        y:
        (canva.height / 2) - 50,

        w: 30,
        h: 100
    }

    // =========================
    // LINHA CENTRAL
    // =========================

    var sep_line = {

        x1: canva.width / 2,
        y1: 0,

        x2: canva.width / 2,
        y2: canva.height
    }

    // =========================
    // PLACAR PLAYER 1
    // =========================

    var player_1_pt = {

        x:
        (canva.width / 2) - 100,

        y: 50,

        points: 0
    }

    // =========================
    // PLACAR PLAYER 2
    // =========================

    var player_2_pt = {

        x:
        (canva.width / 2) + 70,

        y: 50,

        points: 0
    }

    // =========================
    // BOLA
    // =========================

    var ball = {

        x:
        canva.width / 2,

        y:
        canva.height / 2,

        vx: 5,
        vy: 5,

        radius: 15
    }

    // =========================
    // CONTROLES
    // W = CIMA
    // S = BAIXO
    // =========================

    window.onkeydown =
    function(event) {

        if(event.key == "w") {

            player_1.move = -7
        }

        if(event.key == "s") {

            player_1.move = 7
        }
    }

    window.onkeyup =
    function(event) {

        if(event.key == "w") {

            player_1.move = 0
        }

        if(event.key == "s") {

            player_1.move = 0
        }
    }

    // =========================
    // DESENHAR RETÂNGULO
    // =========================

    function draw_fill_rect(
        x,
        y,
        w,
        h,
        color
    ) {

        ctx.fillStyle = color

        ctx.fillRect(
            x,
            y,
            w,
            h
        )
    }

    // =========================
    // DESENHAR TEXTO
    // =========================

    function draw_text(
        text,
        x,
        y,
        color,
        size = 12,
        font = "Arial"
    ) {

        ctx.fillStyle = color

        ctx.font =
        `${size}px ${font}`

        ctx.fillText(
            text,
            x,
            y
        )
    }

    // =========================
    // DESENHAR LINHA
    // =========================

    function draw_line(
        x1,
        y1,
        x2,
        y2,
        color,
        width = 1,
        dash = null
    ) {

        ctx.strokeStyle = color

        ctx.lineWidth = width

        if(dash) {

            ctx.setLineDash(dash)
        }

        ctx.beginPath()

        ctx.moveTo(x1, y1)

        ctx.lineTo(x2, y2)

        ctx.stroke()

        ctx.setLineDash([])
    }

    // =========================
    // DESENHAR CÍRCULO
    // =========================

    function draw_circle(
        x,
        y,
        radius,
        color
    ) {

        ctx.fillStyle = color

        ctx.beginPath()

        ctx.arc(
            x,
            y,
            radius,
            0,
            Math.PI * 2
        )

        ctx.fill()
    }

    // =========================
    // COLISÃO
    // =========================

    function colision_rect_ball(
        rect,
        ball
    ) {

        return (

            ball.x + ball.radius >
            rect.x &&

            ball.x - ball.radius <
            rect.x + rect.w &&

            ball.y + ball.radius >
            rect.y &&

            ball.y - ball.radius <
            rect.y + rect.h
        )
    }

    // =========================
    // RESETAR BOLA
    // =========================

    function reset_ball() {

        ball.x =
        canva.width / 2

        ball.y =
        canva.height / 2

        ball.vx =
        (Math.random() > 0.5 ? 5 : -5)

        ball.vy =
        (Math.random() * 6) - 3
    }

    // =========================
    // DESENHAR TUDO
    // =========================

    function draw() {

        // FUNDO DO JOGO
        draw_fill_rect(
            0,
            0,
            canva.width,
            canva.height,
            "black"
        )

        // PLAYER 1
        draw_fill_rect(
            player_1.x,
            player_1.y,
            player_1.w,
            player_1.h,
            "white"
        )

        // PLAYER 2
        draw_fill_rect(
            player_2.x,
            player_2.y,
            player_2.w,
            player_2.h,
            "white"
        )

        // LINHA CENTRAL
        draw_line(
            sep_line.x1,
            sep_line.y1,
            sep_line.x2,
            sep_line.y2,
            "white",
            3,
            [15, 10]
        )

        // PLACAR PLAYER 1
        draw_text(
            player_1_pt.points,
            player_1_pt.x,
            player_1_pt.y,
            "white",
            50
        )

        // PLACAR PLAYER 2
        draw_text(
            player_2_pt.points,
            player_2_pt.x,
            player_2_pt.y,
            "white",
            50
        )

        // BOLA
        draw_circle(
            ball.x,
            ball.y,
            ball.radius,
            "white"
        )
    }

    // =========================
    // FÍSICA
    // =========================

    function physics() {

        // MOVIMENTO BOLA
        ball.x += ball.vx
        ball.y += ball.vy

        // COLISÃO PAREDE
        if(

            ball.y - ball.radius < 0 ||

            ball.y + ball.radius >
            canva.height

        ) {

            ball.vy = -ball.vy
        }

        // PONTO PLAYER 2
        if(ball.x < 0) {

            player_2_pt.points++

            reset_ball()
        }

        // PONTO PLAYER 1
        if(ball.x > canva.width) {

            player_1_pt.points++

            reset_ball()
        }

        // COLISÃO PLAYER 1
        if(
            colision_rect_ball(
                player_1,
                ball
            )
        ) {

            hit_sound.currentTime = 0

            hit_sound.play()

            let collidePoint =

            ball.y -

            (
                player_1.y +
                player_1.h / 2
            )

            collidePoint =

            collidePoint /

            (
                player_1.h / 2
            )

            let angle =

            collidePoint *

            Math.PI / 4

            let speed =

            Math.sqrt(

                ball.vx * ball.vx +

                ball.vy * ball.vy
            )

            speed *= 1.05

            ball.vx =
            speed * Math.cos(angle)

            ball.vy =
            speed * Math.sin(angle)

            ball.x =

            player_1.x +

            player_1.w +

            ball.radius
        }

        // COLISÃO PLAYER 2
        if(
            colision_rect_ball(
                player_2,
                ball
            )
        ) {

            hit_sound.currentTime = 0

            hit_sound.play()

            let collidePoint =

            ball.y -

            (
                player_2.y +
                player_2.h / 2
            )

            collidePoint =

            collidePoint /

            (
                player_2.h / 2
            )

            let angle =

            collidePoint *

            Math.PI / 4

            let speed =

            Math.sqrt(

                ball.vx * ball.vx +

                ball.vy * ball.vy
            )

            speed *= 1.05

            ball.vx =
            -speed * Math.cos(angle)

            ball.vy =
            speed * Math.sin(angle)

            ball.x =
            player_2.x -
            ball.radius
        }

        // MOVIMENTO PLAYER 1
        player_1.y += player_1.move

        // LIMITES PLAYER 1
        if(player_1.y < 0) {

            player_1.y = 0
        }

        if(
            player_1.y >
            canva.height - player_1.h
        ) {

            player_1.y =
            canva.height -
            player_1.h
        }

        // =========================
        // IA BÁSICA
        // =========================

        let ai_center =

        player_2.y +
        player_2.h / 2

        if(ai_center < ball.y - 10) {

            player_2.y += 4
        }

        else if(ai_center > ball.y + 10) {

            player_2.y -= 4
        }

        // LIMITES IA

        if(player_2.y < 0) {

            player_2.y = 0
        }

        if(
            player_2.y >
            canva.height - player_2.h
        ) {

            player_2.y =
            canva.height -
            player_2.h
        }
    }

    // =========================
    // UPDATE
    // =========================

    function update() {

        draw()

        physics()

        window.requestAnimationFrame(update)
    }

    update()

    // =========================
    // TROCAR DE PÁGINA
    // =========================

    setTimeout(function(){

        window.location.href =
        "game-character.html"

    }, 15000)

</script>

</body>
</html>
